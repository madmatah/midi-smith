name: Docker CI Image

on:
  push:
    branches: [main]
    paths: ['.github/docker/**']
  workflow_dispatch:

permissions:
  packages: write

jobs:
  build-and-push:
    name: Build + push CI image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .github/docker
          push: true
          tags: ghcr.io/${{ github.repository }}/ci:latest
