name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build_and_release:
    name: Build + GitHub Release
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/ci:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure adc-board (Release)
        run: cmake --preset adc-Release

      - name: Build adc-board (Release)
        run: cmake --build --preset adc-Release

      - name: Configure main-board (Release)
        run: cmake --preset main-Release

      - name: Build main-board (Release)
        run: cmake --build --preset main-Release

      - name: Generate .bin and .hex
        run: |
          arm-none-eabi-objcopy -O binary  build/adc-Release/firmwares/adc-board/adc-board.elf  build/adc-Release/firmwares/adc-board/adc-board.bin
          arm-none-eabi-objcopy -O ihex    build/adc-Release/firmwares/adc-board/adc-board.elf  build/adc-Release/firmwares/adc-board/adc-board.hex
          arm-none-eabi-objcopy -O binary  build/main-Release/firmwares/main-board/main-board.elf build/main-Release/firmwares/main-board/main-board.bin
          arm-none-eabi-objcopy -O ihex    build/main-Release/firmwares/main-board/main-board.elf build/main-Release/firmwares/main-board/main-board.hex

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/adc-Release/firmwares/adc-board/adc-board.elf
            build/adc-Release/firmwares/adc-board/adc-board.bin
            build/adc-Release/firmwares/adc-board/adc-board.hex
            build/adc-Release/firmwares/adc-board/adc-board.map
            build/main-Release/firmwares/main-board/main-board.elf
            build/main-Release/firmwares/main-board/main-board.bin
            build/main-Release/firmwares/main-board/main-board.hex
            build/main-Release/firmwares/main-board/main-board.map
