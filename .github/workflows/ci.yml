name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint_and_format_check:
    name: Lint + format-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build clang-format python3-pip

      - name: Install cpplint
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install cpplint

      - name: Configure (Host-Debug)
        run: cmake --preset Host-Debug

      - name: Lint (cpplint)
        run: cmake --build --preset Host-Debug --target lint

      - name: Format check (clang-format)
        run: cmake --build --preset Host-Debug --target format_check

  host_tests:
    name: Host tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build git

      - name: Cache CMake FetchContent (_deps)
        uses: actions/cache@v4
        with:
          path: build/Host-Debug/_deps
          key: ${{ runner.os }}-cmake-deps-host-${{ hashFiles('CMakePresets.json', '**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-cmake-deps-host-

      - name: Configure (Host-Debug)
        run: cmake --preset Host-Debug

      - name: Build
        run: cmake --build --preset Host-Debug

      - name: Run tests
        run: ctest --preset Host-Debug --output-on-failure

  firmware_build:
    name: Build firmware (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: adc-board
            preset: adc-Release
            elf: adc-board.elf
            package_dir: packages/adc-board
          - name: main-board
            preset: main-Release
            elf: main-board.elf
            package_dir: packages/main-board
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools + ARM GCC
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build \
            gcc-arm-none-eabi binutils-arm-none-eabi \
            libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib

      - name: Configure (${{ matrix.preset }})
        run: cmake --preset ${{ matrix.preset }}

      - name: Build (${{ matrix.preset }})
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.name }}-release
          if-no-files-found: error
          path: |
            build/${{ matrix.preset }}/${{ matrix.package_dir }}/${{ matrix.elf }}
            build/${{ matrix.preset }}/${{ matrix.package_dir }}/${{ matrix.name }}.map

  firmware_size_analysis:
    name: Firmware size analysis (${{ matrix.name }})
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        include:
          - name: adc-board
            preset: adc-Release
            elf: adc-board.elf
            package_dir: packages/adc-board
          - name: main-board
            preset: main-Release
            elf: main-board.elf
            package_dir: packages/main-board
    steps:
      - name: Install tools + ARM GCC
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build \
            gcc-arm-none-eabi binutils-arm-none-eabi \
            libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib

      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          path: pr

      - name: Build PR
        working-directory: pr
        run: |
          cmake --preset ${{ matrix.preset }} -DFORCE_DEBUG_SYMBOLS=ON
          cmake --build --preset ${{ matrix.preset }} | tee build_output.txt
          cp build/${{ matrix.preset }}/${{ matrix.package_dir }}/${{ matrix.elf }} ../pr.elf

          echo "## 📊 Memory Usage — ${{ matrix.name }} (PR Branch)" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          sed -n '/Memory region/,/FLASH/p' build_output.txt >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🔍 Bloaty Size Analysis — ${{ matrix.name }}" >> $GITHUB_STEP_SUMMARY

      - name: Checkout Base
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          path: base

      - name: Build Base
        working-directory: base
        run: |
          cmake --preset ${{ matrix.preset }} -DFORCE_DEBUG_SYMBOLS=ON
          cmake --build --preset ${{ matrix.preset }}
          cp build/${{ matrix.preset }}/${{ matrix.package_dir }}/${{ matrix.elf }} ../base.elf

      - name: Run Bloaty
        uses: carlosperate/bloaty-action@v1
        with:
          bloaty-args: pr.elf -- base.elf
          output-to-summary: true
          summary-title: "Memory Impact Report — ${{ matrix.name }} (vs ${{ github.base_ref }})"
